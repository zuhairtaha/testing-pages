<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS.highlights</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <p>The quick brown fox jumps over the lazy dog. The dog was not amused. The fox was very clever and quick.</p>
    <button id="set-sample">Set highlights</button>
    <button id="clear-sample">Clear highlights</button>
    <button id="set-on-selection">Set on Selection</button>

    <select id="highlight-options">
      <option value="yellow-highlight">Yellow Highlight</option>
      <option value="blue-highlight">Blue Highlight</option>
    </select>
    <script src="./app.js"></script>
  </body>
</html>
