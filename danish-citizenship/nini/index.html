<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP3 Audio Looper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md text-center">
        <!-- Header -->
        <h1 class="text-3xl font-bold mb-2 text-indigo-400">Audio Looper</h1>
        <p class="text-gray-400 mb-6">Press the play button to start the audio.</p>

        <!-- Audio Player Element with pre-defined source -->
        <audio id="audio-player" src="./nini.mp3" loop></audio>

        <!-- File Info Display -->
        <div id="file-info" class="mt-6 text-gray-300 h-12 flex items-center justify-center">
            <p id="file-name">Now Playing: nini.mp3</p>
        </div>

        <!-- Playback Controls -->
        <div class="flex justify-center items-center space-x-4 mt-4">
            <button id="play-pause-btn" class="bg-gray-700 p-4 rounded-full focus:outline-none hover:bg-gray-600 transition duration-300 ease-in-out">
                <!-- Play Icon -->
                <svg id="play-icon" class="w-8 h-8" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"></path>
                </svg>
                <!-- Pause Icon (hidden by default) -->
                <svg id="pause-icon" class="w-8 h-8 hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // Get elements from the DOM
        const audioPlayer = document.getElementById('audio-player');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');

        let isPlaying = false;

        // --- Event Listeners ---

        // Listen for clicks on the play/pause button
        playPauseBtn.addEventListener('click', function() {
            if (isPlaying) {
                pauseAudio();
            } else {
                playAudio();
            }
        });

        // Update UI when audio is paused
        audioPlayer.addEventListener('pause', function() {
            setPausedState();
        });

        // Update UI when audio is played
        audioPlayer.addEventListener('play', function() {
            setPlayingState();
        });


        // --- Control Functions ---

        /**
         * Plays the audio and updates the UI.
         */
        function playAudio() {
            audioPlayer.play().catch(error => {
                // Playback might be blocked by the browser, log the error.
                console.error("Playback failed:", error);
                setPausedState();
            });
        }

        /**
         * Pauses the audio and updates the UI.
         */
        function pauseAudio() {
            audioPlayer.pause();
        }

        /**
         * Updates the UI to reflect the 'playing' state.
         */
        function setPlayingState() {
            playIcon.classList.add('hidden');
            pauseIcon.classList.remove('hidden');
            isPlaying = true;
        }

        /**
         * Updates the UI to reflect the 'paused' state.
         */
        function setPausedState() {
            playIcon.classList.remove('hidden');
            pauseIcon.classList.add('hidden');
            isPlaying = false;
        }
    </script>

</body>
</html>
