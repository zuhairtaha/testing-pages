<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DriveSpeak — Location Announcer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --border: #1e2229;
    --accent: #00e5a0;
    --accent2: #ff6b35;
    --text: #e8eaf0;
    --muted: #5a6070;
    --card: #14171e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    z-index: 10;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--accent);
  }
  .logo span { color: var(--text); }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.4s;
  }
  .dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .dot.pulse { animation: pulse 1.5s infinite; }

  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:.5; transform:scale(0.8); }
  }

  /* ── Map ── */
  #map {
    flex: 1;
    width: 100%;
    z-index: 1;
  }

  /* ── Bottom Panel ── */
  #bottom {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    z-index: 10;
    flex-shrink: 0;
  }

  .place-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
  }

  .place-icon {
    width: 42px; height: 42px;
    border-radius: 10px;
    background: linear-gradient(135deg, #00e5a022, #00e5a011);
    border: 1px solid #00e5a044;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  .place-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 2px;
  }

  #place-name {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
    transition: all 0.3s;
  }
  #place-name.flash {
    color: var(--accent);
  }

  #place-sub {
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 3px;
  }

  .controls {
    display: flex;
    gap: 10px;
  }

  button {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  button:hover { border-color: var(--accent); color: var(--accent); }

  button.primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 600;
  }
  button.primary:hover { background: #00fdb5; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Announce toast */
  #toast {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--accent);
    color: #000;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    padding: 10px 24px;
    border-radius: 100px;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Coords display */
  #coords {
    font-size: 0.6rem;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  /* History chips */
  #history {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 10px;
    max-height: 46px;
    overflow: hidden;
  }

  .hist-chip {
    font-size: 0.62rem;
    padding: 3px 10px;
    border-radius: 100px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: 0.04em;
    opacity: 0;
    transform: scale(0.8);
    animation: chipIn 0.3s forwards;
  }
  @keyframes chipIn {
    to { opacity:1; transform:scale(1); }
  }

  .speed-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.65rem;
    color: var(--accent2);
    background: #ff6b3515;
    border: 1px solid #ff6b3530;
    padding: 2px 8px;
    border-radius: 100px;
  }

  /* Leaflet overrides */
  .leaflet-container { background: #0d0f14 !important; }
  .custom-marker {
    width: 20px; height: 20px;
    background: var(--accent);
    border-radius: 50%;
    border: 3px solid #fff;
    box-shadow: 0 0 0 3px var(--accent), 0 0 20px var(--accent);
  }
  .leaflet-tile { filter: brightness(0.7) saturate(0.8) hue-rotate(180deg); }
</style>
</head>
<body>

<header>
  <div class="logo">Drive<span>Speak</span></div>
  <div class="status-pill">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Waiting</span>
  </div>
</header>

<div id="map"></div>

<div id="bottom">
  <div class="place-row">
    <div class="place-icon">📍</div>
    <div>
      <div class="place-label">Current Location</div>
      <div id="place-name">—</div>
      <div id="place-sub">Press Start to begin tracking</div>
    </div>
  </div>

  <div class="controls">
    <button class="primary" id="startBtn" onclick="startTracking()">▶ Start</button>
    <button id="stopBtn" onclick="stopTracking()" disabled>■ Stop</button>
    <button id="muteBtn" onclick="toggleMute()">🔊 Audio</button>
  </div>

  <div id="history"></div>
  <div id="coords">—</div>
</div>

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────
let map, marker, circle, watchId;
let lastPlace = '';
let lastLat = null, lastLng = null;
let muted = false;
let tracking = false;
let placeHistory = [];
const MOVE_THRESHOLD = 80; // metres before re-checking

// ── Map Init ───────────────────────────────────────────
function initMap(lat, lng) {
  if (map) return;
  map = L.map('map', { zoomControl: false, attributionControl: false }).setView([lat, lng], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);
  L.control.zoom({ position: 'topright' }).addTo(map);
}

function updateMapMarker(lat, lng, accuracy) {
  if (!map) initMap(lat, lng);

  const icon = L.divIcon({ className: '', html: '<div class="custom-marker"></div>', iconSize: [20,20], iconAnchor: [10,10] });

  if (!marker) {
    marker = L.marker([lat, lng], { icon }).addTo(map);
    circle = L.circle([lat, lng], { radius: accuracy, color: '#00e5a0', fillColor: '#00e5a0', fillOpacity: 0.08, weight: 1 }).addTo(map);
  } else {
    marker.setLatLng([lat, lng]);
    circle.setLatLng([lat, lng]);
    circle.setRadius(accuracy);
  }

  map.panTo([lat, lng], { animate: true, duration: 1 });
}

// ── Geocoding (Nominatim) ──────────────────────────────
async function getPlaceName(lat, lng) {
  try {
    const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=da,en&zoom=14`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'da,en' } });
    const data = await res.json();
    const a = data.address || {};

    // Priority: suburb > neighbourhood > quarter > city_district > village > town > city
    const place =
      a.suburb ||
      a.neighbourhood ||
      a.quarter ||
      a.city_district ||
      a.village ||
      a.town ||
      a.city ||
      a.county ||
      a.state ||
      'Unknown';

    const city = a.city || a.town || a.village || '';
    const country = a.country_code?.toUpperCase() || '';
    const sub = city && city !== place ? `${city}, ${country}` : country;

    return { place, sub, full: data.display_name };
  } catch(e) {
    console.error('Geocode error', e);
    return { place: 'Unknown', sub: '', full: '' };
  }
}

// ── Speech ─────────────────────────────────────────────
function speak(text) {
  if (muted) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);

  // Try Danish voice first, then English
  const voices = window.speechSynthesis.getVoices();
  const daVoice = voices.find(v => v.lang.startsWith('da'));
  const enVoice = voices.find(v => v.lang.startsWith('en'));
  u.voice = daVoice || enVoice || null;
  u.rate = 0.95;
  u.pitch = 1;
  u.volume = 1;
  window.speechSynthesis.speak(u);
}

// ── Toast ──────────────────────────────────────────────
function showToast(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Place Update ───────────────────────────────────────
async function onLocationUpdate(pos) {
  const { latitude: lat, longitude: lng, accuracy, speed } = pos.coords;

  document.getElementById('coords').textContent =
    `${lat.toFixed(5)}, ${lng.toFixed(5)}  •  acc ±${Math.round(accuracy)}m` +
    (speed ? `  •  ${Math.round(speed * 3.6)} km/h` : '');

  updateMapMarker(lat, lng, accuracy);

  // Only re-geocode if moved enough
  if (lastLat !== null) {
    const dist = haversine(lastLat, lastLng, lat, lng);
    if (dist < MOVE_THRESHOLD) return;
  }

  lastLat = lat; lastLng = lng;

  const { place, sub } = await getPlaceName(lat, lng);

  if (place && place !== lastPlace) {
    lastPlace = place;

    // Update UI
    const nameEl = document.getElementById('place-name');
    nameEl.textContent = place;
    nameEl.classList.add('flash');
    setTimeout(() => nameEl.classList.remove('flash'), 1000);

    document.getElementById('place-sub').textContent = sub || 'Denmark';

    // Add map popup
    if (marker) {
      marker.bindPopup(`<b>${place}</b><br><small>${sub}</small>`).openPopup();
    }

    // History
    if (!placeHistory.includes(place)) {
      placeHistory.unshift(place);
      if (placeHistory.length > 8) placeHistory.pop();
      renderHistory();
    }

    // Announce
    speak(place);
    showToast(place);
  }
}

function renderHistory() {
  const el = document.getElementById('history');
  el.innerHTML = placeHistory.slice(1).map((p, i) =>
    `<span class="hist-chip" style="animation-delay:${i*0.05}s">${p}</span>`
  ).join('');
}

// ── Haversine distance (metres) ────────────────────────
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── Controls ───────────────────────────────────────────
function startTracking() {
  if (!navigator.geolocation) {
    alert('Geolocation is not supported by your browser.');
    return;
  }

  tracking = true;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('stopBtn').disabled = false;
  setStatus('Locating…', false);

  // Load voices
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = () => {};
  }
  speechSynthesis.getVoices();

  watchId = navigator.geolocation.watchPosition(
    (pos) => {
      setStatus('Tracking', true);
      onLocationUpdate(pos);
    },
    (err) => {
      setStatus('GPS Error', false);
      console.error(err);
      if (err.code === 1) alert('Location permission denied. Please allow location access.');
    },
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
  );
}

function stopTracking() {
  if (watchId) navigator.geolocation.clearWatch(watchId);
  tracking = false;
  watchId = null;
  lastLat = null; lastLng = null;
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
  setStatus('Stopped', false);
}

function toggleMute() {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇 Muted' : '🔊 Audio';
  document.getElementById('muteBtn').style.borderColor = muted ? '#ff6b35' : '';
  document.getElementById('muteBtn').style.color = muted ? '#ff6b35' : '';
}

function setStatus(text, active) {
  document.getElementById('statusText').textContent = text;
  const d = document.getElementById('statusDot');
  d.className = 'dot' + (active ? ' active pulse' : '');
}

// ── Demo mode (if no GPS / testing) ───────────────────
// Tap the map to simulate driving to a location
window.addEventListener('load', () => {
  // Init map at Copenhagen as default
  initMap(55.6761, 12.5683);
});

// Allow clicking map to simulate position (useful for desktop testing)
setTimeout(() => {
  if (map) {
    map.on('click', async (e) => {
      if (!tracking) return;
      const fakePos = {
        coords: {
          latitude: e.latlng.lat,
          longitude: e.latlng.lng,
          accuracy: 20,
          speed: null
        }
      };
      lastLat = null; // force update
      await onLocationUpdate(fakePos);
    });
  }
}, 500);
</script>
</body>
</html>
