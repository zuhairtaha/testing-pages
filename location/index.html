<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drive Location Announcer</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-white font-sans antialiased">

    <!-- Map Container -->
    <div id="map" class="absolute inset-0"></div>

    <!-- Top Overlay: Current Location Display -->
    <div class="overlay-ui top-0 left-0 right-0 p-4 sm:p-6 flex flex-col items-center justify-start bg-gradient-to-b from-black/80 to-transparent pb-12 transition-all duration-500">
        <div id="status-badge" class="interactive flex items-center gap-2 bg-slate-800/90 backdrop-blur px-4 py-1.5 rounded-full text-xs font-semibold text-slate-300 mb-3 border border-slate-700 shadow-lg">
            <div id="status-dot" class="w-2 h-2 rounded-full bg-slate-500"></div>
            <span id="status-text">Ready to start</span>
        </div>
        
        <h1 id="current-place" class="text-4xl sm:text-6xl font-extrabold text-center drop-shadow-md text-white tracking-tight transition-all duration-300 scale-100">
            Unknown Location
        </h1>
        <p id="current-region" class="text-lg sm:text-xl text-slate-300 mt-1 font-medium drop-shadow-md text-center">
            Press Start to locate
        </p>
    </div>

    <!-- Bottom Overlay: Controls -->
    <div class="overlay-ui bottom-0 left-0 right-0 p-6 sm:p-8 flex flex-col sm:flex-row items-center justify-center gap-4 bg-gradient-to-t from-black/90 to-transparent pt-24">
        
        <button id="btn-start" onclick="toggleTracking()" class="interactive flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-full font-bold text-lg shadow-[0_0_20px_rgba(37,99,235,0.4)] transition-all hover:scale-105 active:scale-95 w-full sm:w-auto">
            <i data-lucide="navigation"></i>
            <span id="btn-start-text">Start Driving Mode</span>
        </button>

        <button id="btn-demo" onclick="toggleDemo()" class="interactive flex items-center justify-center gap-2 bg-slate-700 hover:bg-slate-600 text-white px-6 py-4 rounded-full font-semibold text-md shadow-lg transition-all hover:scale-105 active:scale-95 w-full sm:w-auto border border-slate-600">
            <i data-lucide="route"></i>
            <span id="btn-demo-text">Simulate Drive</span>
        </button>

    </div>

    <!-- Leaflet Map JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script src="./index.js"></script>
</body>
</html>
